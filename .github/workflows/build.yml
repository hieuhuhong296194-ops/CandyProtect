name: CandyProtect Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Cho phép chạy thủ công từ tab Actions

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Dùng Node 20 LTS

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android AAB
        run: npx eas-cli build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/*.aab
